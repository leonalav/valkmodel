model:
  hidden_size: 1408
  num_hidden_layers: 13
  num_heads: 11
  head_dim: 96
  num_v_heads: 11
  expand_v: 2.0
  intermediate_size: 5632
  vocab_size: 128256
  max_position_embeddings: 272000
  max_training_seq_len: 4096
  attn_mode: chunk
  gdn_backend: auto
  use_gate: true
  use_short_conv: true
  conv_size: 4
  use_latent_state: true
  latent_state_dim: 704
  latent_state_layers: [6, 12]
  use_jepa: true
  jepa_hidden_dim: 704
  jepa_loss_weight: 0.07
  jepa_min_horizon: 1
  jepa_max_horizon: 16
  use_latent_branching: true
  latent_branching_layers: [8, 12]
  num_branches: 4
  branch_value_temperature: 1.25
  branch_diversity_weight: 0.005
  branch_entropy_weight: 0.0015
training:
  learning_rate: 0.00017
  min_learning_rate: 0.000017
  warmup_steps: 750
  max_steps: 160000
  weight_decay: 0.1
  grad_clip: 1.0
  batch_size: 2
  gradient_accumulation_steps: 8
  eval_steps: 750
  save_steps: 5000
  log_steps: 10
  jepa_warmup_steps: 7000
  branch_warmup_steps: 9000
  jepa_ema_update_every: 1
  use_curriculum: true
  curriculum_stages: [1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072]
  curriculum_steps_per_stage: 6000
