model:
  hidden_size: 768
  num_hidden_layers: 12
  num_heads: 6
  head_dim: 96
  num_v_heads: 6
  expand_v: 2.0
  intermediate_size: 3072
  vocab_size: 128256
  max_position_embeddings: 272000
  attn_mode: chunk
  gdn_backend: fla
  use_gate: true
  use_short_conv: true
  conv_size: 4
  use_latent_state: true
  latent_state_dim: 384
  latent_state_layers: [5, 11]
  use_jepa: true
  jepa_hidden_dim: 384
  jepa_loss_weight: 0.03
  jepa_min_horizon: 1
  jepa_max_horizon: 16
  use_latent_branching: true
  latent_branching_layers: [8]
  num_branches: 4
  branch_value_temperature: 1.5
  branch_diversity_weight: 0.001
  branch_entropy_weight: 0.003
training:
  learning_rate: 0.00022
  min_learning_rate: 0.000022
  warmup_steps: 500
  max_steps: 100000
  weight_decay: 0.1
  grad_clip: 1.0
  batch_size: 8
  gradient_accumulation_steps: 4
  eval_steps: 500
  save_steps: 2000
  log_steps: 10
  jepa_warmup_steps: 4000
  branch_warmup_steps: 8000
  jepa_ema_update_every: 1
  use_curriculum: true
  curriculum_stages: [1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072]
  curriculum_steps_per_stage: 2500
