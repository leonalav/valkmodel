model:
  hidden_size: 768
  num_hidden_layers: 12
  num_heads: 12
  head_dim: 64
  vocab_size: 128256
  max_position_embeddings: 2048
  moba_layers: [5, 11]
  mla_layers: [8]
training:
  learning_rate: 0.0003
  warmup_steps: 100
  max_steps: 2000
  weight_decay: 0.1
  grad_clip: 1.0
  balance_loss_weight: 0.01
  num_experts: 4
  expert_top_k: 1
  expert_usage_alert_threshold: 0.02
